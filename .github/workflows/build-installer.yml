name: Build PassWall Installer

on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*-[0-9]*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIN_REQUIRED_PACKAGES: '15'
  MAX_ALLOWED_FAILURES: '5'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      run_name: ${{ steps.installer.outputs.run_name }}
    permissions:
      contents: write
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── 加载配置 / Load config ──
      - name: Load config
        id: cfg
        run: |
          source scripts/utils.sh
          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line// }" ]] && continue
            [[ "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]] && { echo "$line" >> "$GITHUB_ENV"; export "$line"; }
          done < config/openwrt-sdk.conf
          [ -n "${OPENWRT_SDK_URL:-}" ] || { echo "::error::OPENWRT_SDK_URL not set"; exit 1; }

      # ── 环境准备 / Setup environment ──
      - name: Setup environment
        run: |
          source scripts/utils.sh
          step_start "Setup environment"
          export DEBIAN_FRONTEND=noninteractive

          group_start "Install build dependencies"
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential libncurses5-dev gawk gettext unzip file \
            libssl-dev wget python3 python3-yaml git ca-certificates makeself zstd \
            || die "apt-get install failed"
          log_info "Build dependencies installed"
          group_end

          step_end

      # ── 安装工具链 / Install toolchains ──
      - name: Install toolchains
        run: |
          source scripts/utils.sh
          step_start "Install toolchains"

          # ── Go ──
          group_start "Install Go"
          GO_VER=$(curl -fsSL --retry 3 --retry-delay 10 https://go.dev/VERSION?m=text | head -1 | sed 's/go//')
          [ -n "$GO_VER" ] || die "Cannot fetch Go version"
          CURRENT_GO=$(go version 2>/dev/null | awk '{print $3}' | sed 's/go//' || true)
          if [ "$CURRENT_GO" = "$GO_VER" ]; then
            log_info "Go $GO_VER already installed"
          else
            log_info "Installing Go $GO_VER"
            TARBALL="go${GO_VER}.linux-amd64.tar.gz"
            retry 3 20 wget -q "https://go.dev/dl/${TARBALL}" -O "/tmp/${TARBALL}"
            sudo rm -rf /usr/local/go
            sudo tar -C /usr/local -xzf "/tmp/${TARBALL}"
            rm -f "/tmp/${TARBALL}"
            export PATH="/usr/local/go/bin:$PATH"
            echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          fi
          go version || die "Go verification failed"
          group_end

          # ── Rust ──
          group_start "Install Rust"
          if command -v rustc >/dev/null 2>&1; then
            log_info "Rust $(rustc --version | awk '{print $2}') already installed"
            [ -f "$HOME/.cargo/env" ] && source "$HOME/.cargo/env"
          else
            log_info "Installing Rust"
            retry 3 20 bash -c "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable"
            source "$HOME/.cargo/env"
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version || die "Rust verification failed"
          cargo --version || die "Cargo verification failed"
          group_end

          step_end

      # ── SDK 准备 / Setup SDK ──
      - name: Setup SDK
        run: |
          source scripts/utils.sh
          step_start "Setup SDK"

          group_start "Download SDK"
          rm -rf openwrt-sdk
          mkdir -p openwrt-sdk
          cd openwrt-sdk
          SDK_FILE=$(basename "$OPENWRT_SDK_URL")
          log_info "Downloading $SDK_FILE"
          retry 3 30 wget -q "$OPENWRT_SDK_URL" -O "$SDK_FILE"
          [ -f "$SDK_FILE" ] || die "Download failed"
          log_info "Extracting…"
          case "$SDK_FILE" in
            *.tar.zst) tar --use-compress-program=zstd -xf "$SDK_FILE" --strip-components=1 ;;
            *.tar.xz)  tar xf "$SDK_FILE" --strip-components=1 ;;
            *.tar.gz)  tar xzf "$SDK_FILE" --strip-components=1 ;;
            *)         die "Unsupported archive: $SDK_FILE" ;;
          esac
          rm -f "$SDK_FILE"
          cd ..
          group_end

          # 替换 SDK 内置 Go / Replace SDK bundled Go
          group_start "Update SDK Go"
          SYS_GO=$(command -v go 2>/dev/null || echo "/usr/local/go/bin/go")
          if [ -x "$SYS_GO" ]; then
            SYS_VER=$("$SYS_GO" version | awk '{print $3}')
            GOROOT=$("$SYS_GO" env GOROOT)
            log_info "System Go: $SYS_VER ($GOROOT)"
            while IFS= read -r -d '' godir; do
              SDK_VER=$("$godir/bin/go" version 2>/dev/null | awk '{print $3}' || echo "unknown")
              if [ "$SDK_VER" != "$SYS_VER" ]; then
                log_info "Replacing $godir ($SDK_VER → $SYS_VER)"
                rm -rf "$godir" && cp -a "$GOROOT" "$godir"
              fi
            done < <(find openwrt-sdk/staging_dir -maxdepth 4 -type d \( -name "go-*" -o -name "go" \) -print0 2>/dev/null)
          else
            log_warn "System Go not found, skipping SDK Go replacement"
          fi
          group_end

          step_end

      # ── 配置 feeds / Configure feeds ──
      - name: Configure feeds
        run: |
          source scripts/utils.sh
          step_start "Configure feeds"

          cd openwrt-sdk

          group_start "Configure feeds"
          if [ -f feeds.conf.default ]; then
            cp feeds.conf.default feeds.conf
          else
            cat > feeds.conf <<'EOF'
          src-git packages https://github.com/openwrt/packages.git
          src-git luci https://github.com/openwrt/luci.git
          EOF
          fi

          log_info "Full feeds update"
          retry 3 30 ./scripts/feeds update -a || {
            log_warn "Feed update failed, trying GitHub mirrors"
            sed -i \
              -e 's|git.openwrt.org/openwrt/openwrt.git|github.com/openwrt/openwrt.git|g' \
              -e 's|git.openwrt.org/feed/packages.git|github.com/openwrt/packages.git|g' \
              -e 's|git.openwrt.org/project/luci.git|github.com/openwrt/luci.git|g' \
              -e 's|git.openwrt.org/feed/routing.git|github.com/openwrt/routing.git|g' \
              -e 's|git.openwrt.org/feed/telephony.git|github.com/openwrt/telephony.git|g' \
              feeds.conf
            retry 3 30 ./scripts/feeds update -a || die "Feeds update failed"
          }
          group_end

          # 打补丁 / Apply patches
          group_start "Apply patches"
          if [ -d feeds/packages/lang/golang ]; then
            find feeds/packages/lang/golang -type f \( -name "*.mk" -o -name "Makefile" \) \
              -exec grep -l 'GOTOOLCHAIN=local' {} \; \
              -exec sed -i 's/GOTOOLCHAIN=local/GOTOOLCHAIN=auto/g' {} \;
            log_info "Patched GOTOOLCHAIN"
          fi
          CURL_MK="feeds/packages/net/curl/Makefile"
          if [ -f "$CURL_MK" ] && grep -q "LIBCURL_LDAP:libopenldap" "$CURL_MK"; then
            sed -i 's/[[:space:]]*+LIBCURL_LDAP:libopenldap[[:space:]]*//g' "$CURL_MK"
            log_info "Patched curl LDAP"
          fi
          RUST_MK="feeds/packages/lang/rust/Makefile"
          if [ -f "$RUST_MK" ] && grep -qE 'download-ci-llvm=(true|if-unchanged)' "$RUST_MK"; then
            sed -i -E 's/download-ci-llvm=(true|if-unchanged)/download-ci-llvm=false/g' "$RUST_MK"
            log_info "Patched Rust download-ci-llvm"
          fi
          # Fix golang1.26 host-package parse-time error on linux/amd64
          # openwrt-packages sets GO_DEFAULT_VERSION:=1.26, so all Go packages now
          # depend on golang1.26/host. Its Makefile fires $(error) at parse-time;
          # change to $(warning) so parsing succeeds, then pre-install from system Go.
          COMPILER_MK="feeds/packages/lang/golang/golang-compiler.mk"
          if [ -d "feeds/packages/lang/golang/golang1.26" ] && [ -f "$COMPILER_MK" ]; then
            if grep -q '$(error go-' "$COMPILER_MK"; then
              sed -i 's/$(error go-/$(warning go-/g' "$COMPILER_MK"
              log_info "Patched golang-compiler.mk: CheckHost error → warning"
            fi
            # Ensure Package/$(PKG_NAME)/Default has TITLE so BuildPackage passes.
            # Some golang-version.mk versions omit TITLE on linux/amd64,
            # causing "Package/golang1.26-misc is missing the TITLE field" errors.
            GL_VERSION="feeds/packages/lang/golang/golang-version.mk"
            if [ -f "$GL_VERSION" ] && ! grep -qF 'TITLE:=Go programming language' "$GL_VERSION"; then
              awk '/^define Package\/\$\(PKG_NAME\)\/Default/ { print; print "  TITLE:=Go programming language"; next } { print }' \
                "$GL_VERSION" > /tmp/gv-patched.mk && mv /tmp/gv-patched.mk "$GL_VERSION"
              log_info "Patched golang-version.mk: added TITLE to Package/Default"
            fi
            SYS_GO_BIN=$(command -v go 2>/dev/null || true)
            if [ -n "$SYS_GO_BIN" ]; then
              SYS_GO_VER=$("$SYS_GO_BIN" version 2>/dev/null | awk '{print $3}')
              case "$SYS_GO_VER" in
                go1.26*)
                  SYS_GOROOT=$("$SYS_GO_BIN" env GOROOT 2>/dev/null || true)
                  HOST_LIB="staging_dir/host/lib/go-1.26"
                  GO126_BUILD="build_dir/hostpkg/go-1.26.0"
                  if [ -n "$SYS_GOROOT" ] && [ -d "$SYS_GOROOT" ]; then
                    # Copy Go files only if not already present
                    if [ ! -f "$HOST_LIB/bin/go" ]; then
                      log_info "Pre-installing golang1.26 from system $SYS_GO_VER"
                      mkdir -p "$HOST_LIB"
                      cp -a "$SYS_GOROOT/." "$HOST_LIB/"
                      # Remove host-arch prebuilt stdlib (per golang-version.mk Host/Install)
                      rm -rf "$HOST_LIB/pkg/linux_amd64" 2>/dev/null || true
                      # Install openwrt gcc-wrapper used by Go cross-compile
                      GCC_HELPER="feeds/packages/lang/golang/go-gcc-helper"
                      if [ -f "$GCC_HELPER" ]; then
                        mkdir -p "$HOST_LIB/openwrt"
                        install -m 755 "$GCC_HELPER" "$HOST_LIB/openwrt/"
                        [ -L "$HOST_LIB/openwrt/gcc" ]  || ln -sf "go-gcc-helper" "$HOST_LIB/openwrt/gcc"
                        [ -L "$HOST_LIB/openwrt/g++" ]  || ln -sf "go-gcc-helper" "$HOST_LIB/openwrt/g++"
                      fi
                      # Create BinLinks in staging_dir/host/bin/
                      mkdir -p "staging_dir/host/bin"
                      [ -L "staging_dir/host/bin/go1.26" ]    || ln -sf "../lib/go-1.26/bin/go"    "staging_dir/host/bin/go1.26"
                      [ -L "staging_dir/host/bin/gofmt1.26" ] || ln -sf "../lib/go-1.26/bin/gofmt" "staging_dir/host/bin/gofmt1.26"
                      log_info "golang1.26 pre-installed → $HOST_LIB"
                    else
                      log_info "golang1.26 already at $HOST_LIB"
                    fi
                    # Always (re)create stamp files so OpenWrt skips compilation
                    mkdir -p "$GO126_BUILD"
                    for s in .configured .built .installed .stamp_configured .stamp_built .stamp_installed; do
                      touch "$GO126_BUILD/$s"
                    done
                    # Create the host-install stamp so OpenWrt skips host/compile entirely
                    mkdir -p "staging_dir/host/stamp"
                    touch "staging_dir/host/stamp/.golang1.26_installed"
                  fi
                  ;;
              esac
            fi
          fi
          group_end

          # 克隆 PassWall 包 / Clone PassWall packages
          group_start "Clone PassWall package sources"
          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,\
          hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev,shadowsocks-rust,\
          shadowsocksr-libev,simple-obfs,tcping,trojan-plus,tuic-client,v2ray-plugin,\
          xray-plugin,geoview,shadow-tls}
          rm -rf package/passwall-packages
          retry 3 10 git clone --depth=1 \
            https://github.com/Openwrt-Passwall/openwrt-passwall-packages package/passwall-packages
          group_end

          # 安装 feeds 包 / Install feeds
          group_start "Install feeds"
          ./scripts/feeds update -i
          ./scripts/feeds install \
            libev libmbedtls libsodium libopenssl libpcre2 libudns \
            boost boost-program_options boost-system \
            ca-bundle c-ares pcre2 zlib libubox libubus \
            rpcd rpcd-mod-file rpcd-mod-ucode ucode ucode-mod-fs ucode-mod-uci \
            ucode-mod-ubus ucode-mod-math libucode \
            coreutils coreutils-base64 coreutils-nohup curl dnsmasq-full ip-full \
            libuci-lua luci-compat luci-lib-jsonc resolveip luci-lua-runtime \
            iwinfo openssl libnl-tiny golang rust \
            || log_warn "Some feed packages unavailable"
          ./scripts/feeds install luci-base || log_warn "luci-base install had issues"
          ./scripts/feeds install luci-app-passwall || die "Failed to install luci-app-passwall"
          group_end

          # 生成 .config / Generate build config
          group_start "Generate .config"
          rm -f .config .config.old 2>/dev/null || true
          PASSWALL_MK="package/feeds/luci/luci-app-passwall/Makefile"
          PASSWALL_ROOTS="$PWD/.passwall-package-roots"
          [ -f "$PASSWALL_MK" ] || die "PassWall Makefile not found: $PASSWALL_MK"

          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci-app-passwall=m
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=m
          EOF

          while IFS= read -r suffix; do
            echo "CONFIG_PACKAGE_luci-app-passwall_${suffix}=y" >> .config
          done < <(sed -n 's/^config PACKAGE_\$\(PKG_NAME\)_\([A-Za-z0-9_]*\)$/\1/p' "$PASSWALL_MK")

          make defconfig </dev/null

          python3 - <<'PY'
          import re
          from pathlib import Path

          root = Path.cwd()
          makefile = root / "package/feeds/luci/luci-app-passwall/Makefile"
          config = (root / ".config").read_text()
          enabled = set(re.findall(r'^(CONFIG_PACKAGE_luci-app-passwall_[A-Za-z0-9_]+)=[ym]$', config, re.M))

          roots = []
          current = None
          for raw_line in makefile.read_text().splitlines():
            line = raw_line.strip()
            match = re.match(r'^config PACKAGE_\$\(PKG_NAME\)_([A-Za-z0-9_]+)$', line)
            if match:
              current = f"CONFIG_PACKAGE_luci-app-passwall_{match.group(1)}"
              continue
            match = re.match(r'^select PACKAGE_([A-Za-z0-9_\-]+)$', line)
            if match and current in enabled:
              roots.append(match.group(1))

          out = root / ".passwall-package-roots"
          out.write_text("\n".join(sorted(dict.fromkeys(roots))) + "\n")
          print(f"generated {len(set(roots))} passwall root packages")
          PY

          [ -s "$PASSWALL_ROOTS" ] || die "Auto-generated PassWall package root list is empty"
          log_info "Generated $(wc -l < "$PASSWALL_ROOTS") PassWall root packages"
          log_info "Config generated"
          group_end

          # 验证环境 / Validate
          group_start "Validate build environment"
          for tool in go rustc cargo make gcc; do
            command -v "$tool" >/dev/null 2>&1 || die "Missing: $tool"
          done
          check_disk_space 10
          for path in scripts/feeds staging_dir Makefile package/passwall-packages package/feeds/luci/luci-app-passwall; do
            [ -e "$path" ] || die "Missing: $path"
          done
          log_info "Validation passed"
          group_end

          step_end

      # ── 编译包 / Compile packages ──
      - name: Compile packages
        run: |
          source scripts/utils.sh
          step_start "Compile packages"

          cd openwrt-sdk
          export FORCE_UNSAFE_CONFIGURE=1
          export GOPROXY="https://proxy.golang.org,https://goproxy.io,direct"
          # Rust ≥1.90 bootstrap panics when CI env vars are set
          unset CI GITHUB_ACTIONS

          # Rust 编译优化 / Rust compilation optimizations
          RUST_CODEGEN_UNITS="${RUST_CODEGEN_UNITS:-8}"
          RUST_LTO_MODE="${RUST_LTO_MODE:-off}"
          RUST_OPT_LEVEL="${RUST_OPT_LEVEL:-3}"
          RUST_EXTRA_FLAGS="-C codegen-units=${RUST_CODEGEN_UNITS} -C opt-level=${RUST_OPT_LEVEL}"
          [ "$RUST_LTO_MODE" != "off" ] && RUST_EXTRA_FLAGS+=" -C lto=${RUST_LTO_MODE}"
          export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }${RUST_EXTRA_FLAGS}"
          export CARGO_INCREMENTAL=0
          export CARGO_NET_GIT_FETCH_WITH_CLI=true
          export CARGO_PROFILE_RELEASE_DEBUG=0

          log_info "RUSTFLAGS=$RUSTFLAGS"
          log_info "RUST_LTO_MODE=$RUST_LTO_MODE"
          log_info "CARGO_INCREMENTAL=$CARGO_INCREMENTAL"
          log_info "CARGO_PROFILE_RELEASE_DEBUG=$CARGO_PROFILE_RELEASE_DEBUG"

          PASSWALL_ROOTS_FILE="$PWD/.passwall-package-roots"
          [ -s "$PASSWALL_ROOTS_FILE" ] || die "PassWall root package list missing"

          map_passwall_source_dir() {
            local pkg="$1"
            case "$pkg" in
              shadowsocks-libev-*) echo "package/passwall-packages/shadowsocks-libev" ;;
              shadowsocks-rust-*) echo "package/passwall-packages/shadowsocks-rust" ;;
              shadowsocksr-libev-*) echo "package/passwall-packages/shadowsocksr-libev" ;;
              simple-obfs-*) echo "package/passwall-packages/simple-obfs" ;;
              v2ray-geoip|v2ray-geosite) echo "package/passwall-packages/v2ray-geodata" ;;
              luci-app-passwall|luci-i18n-passwall-zh-cn) echo "package/feeds/luci/luci-app-passwall" ;;
              *)
                [ -d "package/passwall-packages/$pkg" ] && echo "package/passwall-packages/$pkg" || return 1
                ;;
            esac
          }

          declare -A LOCAL_SOURCE_PKGS=()
          while IFS= read -r pkg; do
            [ -n "$pkg" ] || continue
            src_dir=$(map_passwall_source_dir "$pkg" || true)
            [ -n "$src_dir" ] || continue
            LOCAL_SOURCE_PKGS["$src_dir"]+=" $pkg"
          done < "$PASSWALL_ROOTS_FILE"
          LOCAL_SOURCE_PKGS["package/feeds/luci/luci-app-passwall"]+=" luci-app-passwall luci-i18n-passwall-zh-cn"

          if grep -Eq '^(shadow-tls|shadowsocks-rust-)' "$PASSWALL_ROOTS_FILE"; then
            group_start "Install Rust target"
            GCC_BIN=$(find staging_dir -type f -path '*/toolchain-*/bin/*-gcc' 2>/dev/null | LC_ALL=C sort | head -n 1 || true)
            [ -n "$GCC_BIN" ] || die "Cannot locate OpenWrt toolchain gcc"
            GCC_TRIPLE=$($GCC_BIN -dumpmachine 2>/dev/null || true)
            [ -n "$GCC_TRIPLE" ] || die "Cannot determine OpenWrt toolchain target triple"
            RUST_TARGET=$(printf '%s' "$GCC_TRIPLE" | sed 's/openwrt/unknown/')
            [ -n "$RUST_TARGET" ] || die "Cannot derive Rust target from $GCC_TRIPLE"
            if rustup target list --installed | grep -qx "$RUST_TARGET"; then
              log_info "Rust target already installed: $RUST_TARGET"
            else
              log_info "Installing Rust target: $RUST_TARGET"
              rustup target add "$RUST_TARGET" || die "Failed to install Rust target: $RUST_TARGET"
            fi
            group_end
          fi

          TOTAL_OK=0
          TOTAL_FAIL=0
          FAILED_LIST=""
          PKG_TIMINGS=""

          add_timing() {
            local name="$1" status="$2" duration="$3"
            local display_time="$duration"
            [[ "$duration" =~ ^[0-9]+$ ]] && display_time="${duration}s"
            log_info "$name finished in ${display_time} ($status)"
            PKG_TIMINGS+="${name}|${status}|${display_time}"$'\n'
          }

          check_disk_space 10

          group_start "Build PassWall package sources"
          while IFS= read -r src_dir; do
            [ -n "$src_dir" ] || continue
            label=$(basename "$src_dir")
            pkg_t0=$(date +%s)
            if make_pkg "$src_dir/compile" "$label"; then
              TOTAL_OK=$((TOTAL_OK + 1))
              add_timing "$label" "ok" "$(( $(date +%s) - pkg_t0 ))"
            else
              TOTAL_FAIL=$((TOTAL_FAIL + 1))
              FAILED_LIST="$FAILED_LIST $label"
              add_timing "$label" "failed" "$(( $(date +%s) - pkg_t0 ))"
            fi
          done < <(printf '%s\n' "${!LOCAL_SOURCE_PKGS[@]}" | LC_ALL=C sort)
          group_end

          log_info "Package sources: $TOTAL_OK OK, $TOTAL_FAIL failed"
          [ -n "$FAILED_LIST" ] && log_warn "Failed:$FAILED_LIST"

          {
            SUMMARY="## Build Summary"$'\n'
            SUMMARY+="- **Built package sources**: $TOTAL_OK"$'\n'
            SUMMARY+="- **Failed package sources**: $TOTAL_FAIL"$'\n'
            if [ -n "$FAILED_LIST" ]; then
              SUMMARY+="### Failed"$'\n'
              for p in $FAILED_LIST; do SUMMARY+="- \`$p\`"$'\n'; done
            fi
            if [ -n "$PKG_TIMINGS" ]; then
              SUMMARY+="### Build Durations"$'\n'
              SUMMARY+="| Package Source | Status | Time |"$'\n'
              SUMMARY+="| --- | --- | --- |"$'\n'
              while IFS='|' read -r pkg status sec; do
                [ -z "$pkg" ] && continue
                SUMMARY+="| $pkg | $status | $sec |"$'\n'
              done <<< "$PKG_TIMINGS"
            fi
            gh_summary "$SUMMARY"
          }

          MIN_REQUIRED=1
          MAX_FAILURES=0
          [ "$TOTAL_FAIL" -gt "$MAX_FAILURES" ] && die "Too many failures: $TOTAL_FAIL > $MAX_FAILURES"
          [ "$TOTAL_OK" -lt "$MIN_REQUIRED" ] && die "No PassWall package source was built"

          log_info "Compilation complete: $TOTAL_OK package sources"
          step_end

      # ── 收集产物 / Collect packages ──
      - name: Collect packages
        run: |
          source scripts/utils.sh
          step_start "Collect packages"

          cd openwrt-sdk

          PAYLOAD="${GITHUB_WORKSPACE}/payload"
          DEPENDS="$PAYLOAD/depends"
          find "$PAYLOAD" -maxdepth 1 -type f \( -name '*.apk' -o -name '*.run' \) -delete 2>/dev/null || true
          find "$DEPENDS" -maxdepth 1 -type f -name '*.apk' -delete 2>/dev/null || true
          mkdir -p "$DEPENDS"
          PASSWALL_ROOTS_FILE="$PWD/.passwall-package-roots"
          [ -s "$PASSWALL_ROOTS_FILE" ] || die "PassWall root package list missing"

          declare -A APK_INDEX=()
          declare -A TOPLEVEL_PKGS=()
          declare -A COPIED_PKGS=()
          declare -A SEEN_PKGS=()
          declare -A MISSING_PKGS=()
          declare -A MISSING_LOCAL_DEPS=()
          declare -A OFFICIAL_FETCH_PKGS=()
          QUEUE=()

          queue_pkg() {
            local pkg="$1"
            [ -n "$pkg" ] || return 0
            [ -n "${SEEN_PKGS[$pkg]+x}" ] && return 0
            SEEN_PKGS["$pkg"]=1
            QUEUE+=("$pkg")
          }

          index_apks() {
            local apk_file pkg_name current
            while IFS= read -r -d '' apk_file; do
              pkg_name=$(apk_pkginfo_values "$apk_file" pkgname | head -n 1 || true)
              if [ -z "$pkg_name" ]; then
                log_warn "Skipping APK without pkgname metadata: $apk_file"
                continue
              fi
              current="${APK_INDEX[$pkg_name]:-}"
              if [ -z "$current" ] || [ "$apk_file" -nt "$current" ]; then
                APK_INDEX["$pkg_name"]="$apk_file"
              fi
            done < <(find bin/packages -type f -name '*.apk' -print0)
          }

          copy_indexed_pkg() {
            local pkg="$1" dest="$2" apk_file
            apk_file="${APK_INDEX[$pkg]:-}"
            [ -n "$apk_file" ] || return 1
            [ -n "${COPIED_PKGS[$pkg]+x}" ] && return 0
            cp "$apk_file" "$dest/"
            COPIED_PKGS["$pkg"]="$dest"
            log_info "Collected $pkg → $(basename "$apk_file")"
          }

          enqueue_apk_dependencies() {
            local pkg="$1" apk_file dep raw_dep
            apk_file="${APK_INDEX[$pkg]:-}"
            [ -n "$apk_file" ] || return 0
            while IFS= read -r raw_dep; do
              dep=$(normalize_apk_dependency "$raw_dep" || true)
              [ -n "$dep" ] || continue
              if [ -n "${APK_INDEX[$dep]+x}" ]; then
                queue_pkg "$dep"
              else
                MISSING_LOCAL_DEPS["$dep"]=1
                OFFICIAL_FETCH_PKGS["$dep"]=1
              fi
            done < <(apk_pkginfo_values "$apk_file" depend)
          }

          make_official_repositories() {
            local repo_file="$1"
            local dist_root target_path arch_packages
            dist_root="${OPENWRT_SDK_URL%%/targets/*}"
            target_path=$(printf '%s' "$OPENWRT_SDK_URL" | sed -n 's#.*/targets/\([^/]*/[^/]*\)/.*#\1#p')
            arch_packages=$(sed -n 's/^CONFIG_TARGET_ARCH_PACKAGES="\([^"]*\)"/\1/p' .config | head -n 1)
            [ -n "$dist_root" ] || die "Cannot derive OpenWrt dist root from SDK URL"
            [ -n "$target_path" ] || die "Cannot derive target path from SDK URL"
            [ -n "$arch_packages" ] || die "Cannot derive ARCH_PACKAGES from .config"
            cat > "$repo_file" <<EOF
          set APK_ARCH=$arch_packages
          v3 $dist_root/targets/$target_path/packages
          v3 $dist_root/packages/$arch_packages/base
          v3 $dist_root/packages/$arch_packages/packages
          v3 $dist_root/packages/$arch_packages/luci
          v3 $dist_root/packages/$arch_packages/routing
          v3 $dist_root/packages/$arch_packages/telephony
          EOF
          }

          fetch_official_packages() {
            local repo_file="$1" dest_dir="$2"
            shift 2
            [ "$#" -gt 0 ] || return 0
            local apk_tool="staging_dir/host/bin/apk"
            local arch_packages
            arch_packages=$(sed -n 's/^CONFIG_TARGET_ARCH_PACKAGES="\([^"]*\)"/\1/p' .config | head -n 1)
            [ -x "$apk_tool" ] || die "OpenWrt host apk tool not found: $apk_tool"
            [ -n "$arch_packages" ] || die "Cannot derive ARCH_PACKAGES from .config"
            "$apk_tool" \
              --allow-untrusted \
              --force-missing-repositories \
              --force-refresh \
              --no-interactive \
              --arch "$arch_packages" \
              --repositories-file "$repo_file" \
              fetch --recursive -o "$dest_dir" "$@"
          }

          group_start "Collect packages"
          index_apks

          [ -n "${APK_INDEX[luci-app-passwall]:-}" ] || die "luci-app-passwall APK not found"
          copy_indexed_pkg "luci-app-passwall" "$PAYLOAD"
          TOPLEVEL_PKGS["luci-app-passwall"]=1
          queue_pkg "luci-app-passwall"

          if [ -n "${APK_INDEX[luci-i18n-passwall-zh-cn]:-}" ]; then
            copy_indexed_pkg "luci-i18n-passwall-zh-cn" "$PAYLOAD"
            TOPLEVEL_PKGS["luci-i18n-passwall-zh-cn"]=1
            queue_pkg "luci-i18n-passwall-zh-cn"
          else
            log_info "Chinese i18n package not found (non-critical)"
          fi

          ROOT_COUNT=0
          while IFS= read -r p; do
            [ -n "$p" ] || continue
            ROOT_COUNT=$((ROOT_COUNT + 1))
            if [ -n "${APK_INDEX[$p]:-}" ]; then
              queue_pkg "$p"
            else
              OFFICIAL_FETCH_PKGS["$p"]=1
            fi
          done < "$PASSWALL_ROOTS_FILE"

          queue_index=0
          while [ "$queue_index" -lt "${#QUEUE[@]}" ]; do
            pkg="${QUEUE[$queue_index]}"
            queue_index=$((queue_index + 1))
            if [ -n "${TOPLEVEL_PKGS[$pkg]+x}" ]; then
              enqueue_apk_dependencies "$pkg"
              continue
            fi
            copy_indexed_pkg "$pkg" "$DEPENDS" || {
              MISSING_PKGS["$pkg"]=1
              continue
            }
            enqueue_apk_dependencies "$pkg"
          done

          OFFICIAL_REPO_FILE="$PWD/.official-repositories"
          make_official_repositories "$OFFICIAL_REPO_FILE"

          OFFICIAL_LIST=()
          for pkg in "${!OFFICIAL_FETCH_PKGS[@]}"; do
            OFFICIAL_LIST+=("$pkg")
          done

          if [ "${#OFFICIAL_LIST[@]}" -gt 0 ]; then
            group_start "Fetch official dependency APKs"
            printf '%s\n' "${OFFICIAL_LIST[@]}" | LC_ALL=C sort > /tmp/passwall-official-fetch.txt
            mapfile -t OFFICIAL_LIST < /tmp/passwall-official-fetch.txt
            fetch_official_packages "$OFFICIAL_REPO_FILE" "$DEPENDS" "${OFFICIAL_LIST[@]}" \
              || die "Failed to fetch official dependency APKs"
            group_end
          fi

          DEP_COUNT=$(find "$DEPENDS" -maxdepth 1 -name '*.apk' | wc -l)
          MISSING_COUNT=${#MISSING_PKGS[@]}
          log_info "Collected $DEP_COUNT dependency APKs from $ROOT_COUNT requested roots"
          [ "$MISSING_COUNT" -gt 0 ] && log_warn "Requested packages missing from artifacts: ${!MISSING_PKGS[*]}"
          [ "${#MISSING_LOCAL_DEPS[@]}" -gt 0 ] && log_warn "Unresolved local dependency APKs: ${!MISSING_LOCAL_DEPS[*]}"

          {
            SUMMARY="## Payload Dependency Closure"$'\n'
            SUMMARY+="- Requested root packages: $ROOT_COUNT"$'\n'
            SUMMARY+="- Collected dependency APKs: $DEP_COUNT"$'\n'
            SUMMARY+="- Missing requested APKs: ${#MISSING_PKGS[@]}"$'\n'
            SUMMARY+="- Unresolved local dependencies: ${#MISSING_LOCAL_DEPS[@]}"$'\n'
            SUMMARY+="- Officially fetched dependency roots: ${#OFFICIAL_FETCH_PKGS[@]}"$'\n'
            if [ "${#MISSING_PKGS[@]}" -gt 0 ]; then
              SUMMARY+="### Missing Requested APKs"$'\n'
              for pkg in "${!MISSING_PKGS[@]}"; do SUMMARY+="- $pkg"$'\n'; done
            fi
            if [ "${#OFFICIAL_FETCH_PKGS[@]}" -gt 0 ]; then
              SUMMARY+="### Official Fetch Roots"$'\n'
              for pkg in "${!OFFICIAL_FETCH_PKGS[@]}"; do SUMMARY+="- $pkg"$'\n'; done
            fi
            if [ "${#MISSING_LOCAL_DEPS[@]}" -gt 0 ]; then
              SUMMARY+="### Unresolved Local Dependencies"$'\n'
              for pkg in "${!MISSING_LOCAL_DEPS[@]}"; do SUMMARY+="- $pkg"$'\n'; done
            fi
            gh_summary "$SUMMARY"
          }
          group_end

          group_start "Validate payload"
          MIN_DEPS=${MIN_REQUIRED_PACKAGES:-10}
          [ "$DEP_COUNT" -eq 0 ] && die "No dependency APKs found"
          [ "$DEP_COUNT" -lt "$MIN_DEPS" ] && die "Only $DEP_COUNT packages collected (expected at least $MIN_DEPS)"
          [ "$MISSING_COUNT" -eq 0 ] || die "Some locally built PassWall packages are missing from payload"
          [ -f "$PAYLOAD/install.sh" ] || die "install.sh missing from payload"
          find "$PAYLOAD" -maxdepth 1 -type f \
            \( -name "luci-app-passwall-*.apk" -o -name "luci-app-passwall_*.apk" \) \
            -print -quit | grep -q . \
            || die "luci-app-passwall not found in payload"
          log_info "Payload OK: $DEP_COUNT deps"
          group_end

          step_end

      # ── 打包安装文件 / Build installer ──
      - name: Build installer
        id: installer
        run: |
          source scripts/utils.sh
          step_start "Build installer"

          group_start "Build installer"
          mkdir -p build/payload
          cp -r payload/* build/payload/
          chmod +x build/payload/install.sh
          cd build

          PW_FILE=""
          for f in payload/luci-app-passwall-*.apk payload/luci-app-passwall_*.apk; do
            [ -e "$f" ] && { PW_FILE=$(basename "$f"); break; }
          done
          [ -z "$PW_FILE" ] && die "luci-app-passwall package not found"
          PW_VER=$(echo "$PW_FILE" | sed -E 's/luci-app-passwall[-_]//; s/[-_].*//')

          ARCH=$(echo "$OPENWRT_SDK_URL" | sed -n 's#.*/targets/\([^/]*/[^/]*\)/.*#\1#p' | tr '/' '_')
          [ -z "$ARCH" ] && { log_warn "Cannot extract architecture from SDK URL, using 'unknown'"; ARCH="unknown"; }
          SDK_VER=$(echo "$OPENWRT_SDK_URL" | sed -n 's#.*/openwrt-sdk-\([0-9.]*\(-rc[0-9]*\)\?\)-.*#\1#p')
          [ -z "$SDK_VER" ] && { log_warn "Cannot extract SDK version from SDK URL, using 'unknown'"; SDK_VER="unknown"; }

          RUN_NAME="passwall_${PW_VER}_${ARCH}_sdk_${SDK_VER}.run"
          LABEL="passwall_${PW_VER}_with_sdk_${SDK_VER}"

          log_info "Building $RUN_NAME"
          makeself --nox11 --sha256 payload "../${RUN_NAME}" "${LABEL}" ./install.sh \
            || die "makeself failed"
          cd ..
          group_end

          group_start "Verify installer"
          log_info "$(file "$RUN_NAME")"
          sh "$RUN_NAME" --check || die "Integrity check failed"
          log_info "OK — $(du -h "$RUN_NAME" | cut -f1)"
          group_end

          gh_set_env "RUN_NAME" "$RUN_NAME"
          echo "run_name=${RUN_NAME}" >> "$GITHUB_OUTPUT"

          step_end

      # ── 发布 / Publish ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.installer.outputs.run_name }}
          path: ${{ steps.installer.outputs.run_name }}

      - name: Diagnostics
        if: always()
        run: |
          source scripts/utils.sh
          GO_VER=$(go version 2>/dev/null || echo N/A)
          RUST_VER=$(rustc --version 2>/dev/null || echo N/A)
          DISK_AVAIL=$(df -h / --output=avail | tail -1 | tr -d ' ')
          INSTALLER_INFO=""
          if [ -n "${RUN_NAME:-}" ] && [ -f "${RUN_NAME}" ]; then
            INSTALLER_INFO="${RUN_NAME} ($(du -h "${RUN_NAME}" | cut -f1))"
          fi
          log_info "Go: $GO_VER"
          log_info "Rust: $RUST_VER"
          log_info "Disk: $DISK_AVAIL"
          log_info "SDK: ${OPENWRT_SDK_URL:-not set}"
          if [ -n "$INSTALLER_INFO" ]; then
            log_info "Installer: $INSTALLER_INFO"
          else
            log_warn "Installer: not built"
          fi
          {
            echo "### Build Info"
            echo "- Go: $GO_VER"
            echo "- Rust: $RUST_VER"
            echo "- Disk: $DISK_AVAIL"
            echo "- SDK: \`${OPENWRT_SDK_URL:-not set}\`"
            [ -n "$INSTALLER_INFO" ] \
              && echo "- Installer: $INSTALLER_INFO" \
              || echo "- Installer: not built"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.run_name }}
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## Run 文件使用方式 | Run File Usage
            将 `<RUN_FILE>.run` 替换为本次发布附件中的实际文件名。
            ```bash
            scp <RUN_FILE>.run root@openwrt:/tmp/
            ssh root@openwrt 'cd /tmp && chmod +x <RUN_FILE>.run && ./<RUN_FILE>.run'
            # Optional: restart service to apply changes
            ssh root@openwrt '/etc/init.d/passwall restart'
            ```
          files: ${{ needs.build.outputs.run_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
